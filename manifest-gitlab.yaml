instructions:
  # ============================================================
  # 1. TERRAFORM VALIDITY & SYNTAX
  # ============================================================
  - name: Terraform Validity and Syntax
    fileFilters:
      - "**/*.tf"
      - "**/*.tfvars"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge; introduces broken, unsafe, or non-functional infrastructure
      - [WARNING]  — should be fixed; violates best practice or will cause future problems
      - [SUGGESTION] — improvement that increases maintainability or clarity

      Validate HCL correctness and structural integrity:

      1. [CRITICAL] All variable, local, module, and data source references must resolve to declared identifiers — flag any `var.*`, `local.*`, `module.*`, or `data.*` reference that has no matching declaration.
      2. [CRITICAL] The `terraform` block must declare `required_version` with a patch-level pessimistic constraint (e.g., `~> 1.7.0`) and `required_providers` with explicit version constraints for every provider used.
      3. [CRITICAL] The `hashicorp/aws` provider must be pinned at minimum at the minor level (e.g., `~> 5.40`) — a bare `>= X` with no upper bound is not acceptable.
      4. [CRITICAL] `for_each` expressions must never be derived from values unknown at plan time (e.g., resource IDs of resources being created in the same plan) — this causes the "Invalid for_each argument" error.
      5. [WARNING] Deprecated HCL functions must not be used: replace `list()` with `tolist()`, `map()` with `tomap()`, bare `lookup(x, key)` with `lookup(x, key, null)` or `try()`.
      6. [WARNING] `for_each` must be preferred over `count` for all named resources. `count` is only acceptable for simple boolean feature flags: `count = var.enabled ? 1 : 0`.
      7. [WARNING] Every `lifecycle` block (`create_before_destroy`, `prevent_destroy`, `ignore_changes`) must have an inline comment explaining the operational reason. A lifecycle block without a comment is always flagged.
      8. [WARNING] `dynamic` blocks longer than 3 lines must use a named `iterator` label that reflects the iterated object — never rely on the default iterator name.
      9. [WARNING] `null_resource` must not be used where `terraform_data` (available since Terraform v1.4) or a native AWS resource can replace it.
      10. [SUGGESTION] `templatefile()` should be used instead of inline `<<EOF` heredocs for any template longer than 5 lines.

  # ============================================================
  # 2. AWS RESOURCE VALIDITY & PROVIDER COMPATIBILITY
  # ============================================================
  - name: AWS Resource Validity and Provider Compatibility
    fileFilters:
      - "**/*.tf"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge
      - [WARNING]  — should be fixed; violates best practice
      - [SUGGESTION] — improvement

      Ensure AWS resources use current, non-deprecated APIs compatible with the declared provider version:

      1. [CRITICAL] These deprecated resource types must not be used — flag with the required replacement:
         - `aws_elasticsearch_domain` → `aws_opensearch_domain`
         - `aws_s3_bucket` with inline `acl`, `logging`, `versioning`, `lifecycle_rule`, or `cors_rule` arguments → use standalone resources: `aws_s3_bucket_versioning`, `aws_s3_bucket_lifecycle_configuration`, `aws_s3_bucket_logging`, `aws_s3_bucket_cors_configuration`
         - `aws_alb` / `aws_alb_listener` / `aws_alb_target_group` → `aws_lb_*` equivalents
         - `aws_db_security_group` → VPC security groups
      2. [CRITICAL] `aws_security_group` must not mix provider v5 standalone rule resources (`aws_vpc_security_group_ingress_rule`, `aws_vpc_security_group_egress_rule`) with legacy inline `ingress`/`egress` blocks in the same resource — this causes perpetual drift.
      3. [CRITICAL] All IAM policy documents must use the `aws_iam_policy_document` data source and reference `.json` output — never use raw inline JSON strings as policy documents.
      4. [CRITICAL] `aws_eks_cluster` must declare `version` explicitly — omitting it causes silent in-place upgrades driven by AWS, not by the team.
      5. [CRITICAL] `aws_acm_certificate` must use `validation_method = "DNS"` — email validation cannot be automated in a pipeline.
      6. [WARNING] `aws_lambda_function` must declare `architectures` explicitly (`["x86_64"]` or `["arm64"]`) — never rely on the implicit default.
      7. [WARNING] `aws_cloudwatch_log_group` must be declared explicitly for every Lambda function, ECS task definition, and API Gateway stage — never rely on AWS auto-creating log groups, as this bypasses retention and KMS settings.
      8. [WARNING] ECS task definition `container_definitions` must use `jsonencode()` — not raw JSON strings.
      9. [WARNING] `aws_route53_record` must declare an explicit `ttl` for all non-alias records.
      10. [WARNING] RDS parameter groups and option groups must be explicitly declared as Terraform resources for any production database — never rely on AWS default parameter groups for production workloads.
      11. [SUGGESTION] `aws_lambda_function` should prefer `architectures = ["arm64"]` for cost efficiency unless the runtime or dependency explicitly requires x86_64.

  # ============================================================
  # 3. NAMING CONVENTIONS
  # ============================================================
  - name: Naming Conventions
    fileFilters:
      - "**/*.tf"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge
      - [WARNING]  — should be fixed
      - [SUGGESTION] — improvement

      Enforce clear, full-word, consistent naming that prioritises readability over brevity:

      1. [CRITICAL] All Terraform identifiers (resources, variables, locals, outputs, modules) must use `snake_case` — no hyphens, camelCase, or PascalCase. Example: `aws_s3_bucket.audit_logs` is correct; `aws_s3_bucket.auditLogs` and `aws_s3_bucket.audit-logs` are both violations.
      2. [WARNING] Names must use complete English words. Abbreviations are only acceptable if they are universally established AWS/Terraform terms (`vpc`, `iam`, `rds`, `ec2`, `s3`, `arn`, `cidr`, `eks`, `ecs`, `alb`, `nlb`, `kms`, `sns`, `sqs`). Flag: `mgmt`, `svc`, `cfg`, `usr`, `env`, `prd`, `stg`, `db` as abbreviations requiring expansion to `management`, `service`, `configuration`, `user`, `environment`, `production`, `staging`, `database`.
      3. [WARNING] Resource logical names must describe the specific purpose, not the generic type. Examples:
         - Bad: `aws_s3_bucket.bucket`, `aws_iam_role.role`, `aws_vpc.vpc`
         - Good: `aws_s3_bucket.audit_logs`, `aws_iam_role.lambda_invoice_processor`, `aws_vpc.production_primary`
      4. [WARNING] Variable names must describe what the value is for, not its type. Examples:
         - Bad: `db_class`, `cidr`, `flag`, `size`
         - Good: `database_instance_class`, `vpc_cidr_block`, `enable_deletion_protection`, `rds_allocated_storage_gb`
      5. [WARNING] Output names must follow `<resource_type>_<attribute>` scoped to the module purpose. Examples:
         - Bad: `id`, `arn`, `endpoint`
         - Good: `vpc_id`, `rds_primary_endpoint`, `eks_cluster_arn`, `kms_key_arn`
      6. [WARNING] AWS `Name` tags and the resource's Terraform logical name must be aligned. AWS-visible names use `kebab-case` (`acme-production-payments-rds-primary`); Terraform identifiers use `snake_case` (`acme_production_payments_rds_primary`). Misalignment between the two makes tracing resources in the AWS console against Terraform state error-prone.
      7. [WARNING] Environment variable files must use full environment names: `production.tfvars`, `staging.tfvars`, `development.tfvars`. Flag: `prod.tfvars`, `stg.tfvars`, `dev.tfvars`.
      8. [WARNING] File names must follow the standard structure: `main.tf`, `variables.tf`, `outputs.tf`, `locals.tf`, `data.tf`, `providers.tf`, `versions.tf`. Domain grouping is acceptable (`networking.tf`, `iam.tf`, `storage.tf`) but unrelated resources must not share a file.
      9. [SUGGESTION] Module block names should describe the specific instance being provisioned, not the module's internal name. Prefer `module "payments_postgresql"` over `module "rds"`; prefer `module "frontend_cloudfront"` over `module "cdn"`.
      10. [SUGGESTION] `locals.tf` should define a `name_prefix` local (e.g., `"${var.project_name}-${var.environment}-${var.aws_region}"`) and all resource `Name` tags and identifiers should derive from it, ensuring global uniqueness and naming consistency without repetition.

  # ============================================================
  # 4. SECURITY & ENCRYPTION
  # ============================================================
  - name: Security and Encryption
    fileFilters:
      - "**/*.tf"
      - "**/*.tfvars"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge; active security vulnerability
      - [WARNING]  — should be fixed; security best practice violation
      - [SUGGESTION] — improvement

      Flag all AWS security misconfigurations. Apply these rules to every resource type, not only the ones explicitly named:

      1. [CRITICAL] No secrets, passwords, tokens, or access keys may appear anywhere in `.tf` or `.tfvars` files. All secrets must be sourced at runtime from AWS Secrets Manager (`aws_secretsmanager_secret_version`) or SSM Parameter Store (`aws_ssm_parameter` with `type = "SecureString"`).
      2. [CRITICAL] All variables and outputs that hold sensitive values (passwords, tokens, private keys, connection strings) must be declared with `sensitive = true`.
      3. [CRITICAL] Security groups must not permit ingress from `0.0.0.0/0` or `::/0` on any port except 80 and 443. The following ports are always critical violations regardless of justification: 22 (SSH), 3389 (RDP), 5432 (PostgreSQL), 3306 (MySQL), 1433 (MSSQL), 27017 (MongoDB), 6379 (Redis).
      4. [CRITICAL] IAM policies must follow least privilege — any statement combining `"Action": "*"` with `"Resource": "*"` is a critical violation.
      5. [CRITICAL] `aws_iam_role` trust policies must scope `Principal` to the most specific service, account ID, or role ARN. `"Principal": "*"` is never acceptable.
      6. [CRITICAL] ALB listeners on port 80 must use a `redirect` action to HTTPS — never a `forward` action. Serving production traffic over plain HTTP is a critical violation.
      7. [WARNING] All at-rest encryption must be explicitly enabled — never rely on provider defaults:
         - S3: `aws_s3_bucket_server_side_encryption_configuration` with `aws:kms`
         - EBS: `encrypted = true`
         - RDS: `storage_encrypted = true`
         - EFS: `encrypted = true`
         - DynamoDB: `server_side_encryption { enabled = true }`
         - SQS and SNS: `kms_master_key_id` set to a customer-managed KMS key ARN
      8. [WARNING] All KMS keys (`aws_kms_key`) must have `enable_key_rotation = true`. Customer-managed keys must be used for all sensitive workloads — AWS-managed keys (`aws/s3`, `aws/rds`) are only acceptable for non-sensitive dev/staging data.
      9. [WARNING] All S3 buckets must have `aws_s3_bucket_public_access_block` with all four attributes set to `true`. Any exception must have a comment explaining the public-hosting requirement.
      10. [WARNING] RDS, ElastiCache, OpenSearch, and Redshift must all have `publicly_accessible = false`.
      11. [WARNING] IAM inline policies must not be used — all policies must be standalone `aws_iam_policy` resources.
      12. [WARNING] VPC flow logs must be enabled — an `aws_flow_log` resource must exist for every `aws_vpc`, directed to CloudWatch Logs or S3.
      13. [WARNING] `aws_secretsmanager_secret` must have `recovery_window_in_days` set to at least 7 for production secrets — a value of 0 (force-delete) is only acceptable in development/test environments with a justifying comment.
      14. [WARNING] WAF (`aws_wafv2_web_acl`) must be associated with all internet-facing ALBs, CloudFront distributions, and API Gateways.
      15. [SUGGESTION] ECR repositories should have `image_scanning_configuration { scan_on_push = true }` and `encryption_configuration { encryption_type = "KMS" }`.

  # ============================================================
  # 5. SCALABILITY, FLEXIBILITY & MODULE DESIGN
  # ============================================================
  - name: Scalability, Flexibility and Module Design
    fileFilters:
      - "**/*.tf"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge
      - [WARNING]  — should be fixed
      - [SUGGESTION] — improvement

      Ensure the codebase is designed for long-term reuse, multi-environment flexibility, and clean module boundaries:

      1. [CRITICAL] Resources that may be provisioned more than once must use `for_each` over a `map` or `set of strings` — duplicate resource blocks for multi-instance patterns are never acceptable.
      2. [CRITICAL] Modules must never contain `provider` blocks — provider configuration is always the caller's responsibility. A provider block inside a module creates hidden coupling and makes the module non-reusable across accounts and regions.
      3. [CRITICAL] Modules must be fully self-contained — no references to variables, locals, or resources outside the module's own scope.
      4. [CRITICAL] External module sources (Terraform Registry or `git::`) must be pinned to a specific version tag or commit SHA — never a branch name, `latest`, or an unpinned path.
      5. [WARNING] All environment-specific values (instance sizes, storage sizes, counts, CIDR ranges, feature flags, ARNs) must be abstracted into variables with per-environment `.tfvars` files. No environment-conditional logic (`var.environment == "production" ? ...`) may appear inside resource blocks.
      6. [WARNING] Complex `for_each` map expressions must be built as named locals in `locals.tf` — never inline complex transformations directly in a resource's `for_each` argument.
      7. [WARNING] Groups of 3 or more related attributes that are always configured together must use a single `object()` typed variable. Example: instead of `var.db_instance_class`, `var.db_storage_gb`, `var.db_multi_az` as separate variables, declare `var.database_config = object({ instance_class = string, storage_gb = number, multi_az = bool })`.
      8. [WARNING] Modules must accept `additional_tags = map(string)` with `default = {}` so callers can inject context-specific tags without modifying the module source.
      9. [WARNING] Modules that attach IAM policies must expose `additional_policy_arns = list(string)` with `default = []` so callers can extend permissions without forking the module.
      10. [WARNING] Module nesting must not exceed two levels (root → module → submodule) without documented justification. Three or more levels of nesting creates debugging and refactoring complexity that is rarely justified.
      11. [SUGGESTION] Feature flags should follow the pattern `variable "enable_<feature_name>" { type = bool; default = false }`. Conditional resources should use `count = var.enable_<feature_name> ? 1 : 0` or `for_each = var.enable_<feature_name> ? toset(["enabled"]) : toset([])`.
      12. [SUGGESTION] `locals.tf` should define a `name_prefix` local (e.g., `"${var.project_name}-${var.environment}"`) and all resource names and identifiers should derive from it to ensure consistency and global uniqueness without repetition across resource blocks.

  # ============================================================
  # 6. VARIABLES, OUTPUTS & CODE CLARITY
  # ============================================================
  - name: Variables, Outputs and Code Clarity
    fileFilters:
      - "**/*.tf"
      - "**/variables.tf"
      - "**/outputs.tf"
      - "**/*.tfvars"
      - "**/*.md"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge
      - [WARNING]  — should be fixed
      - [SUGGESTION] — improvement

      Validate variable and output quality, and enforce code readability standards:

      1. [CRITICAL] Every variable must have an explicit `type` declaration — untyped `variable "x" {}` is never acceptable.
      2. [CRITICAL] `.tfvars` files must not supply values for variables that are not declared in `variables.tf`, and must not leave any required (no-default) variable undefined.
      3. [WARNING] Every variable must have a `description` that explains its purpose, expected format, and constraints (e.g., `"CIDR block for the primary VPC — must be /16 or larger to accommodate all subnets"`). A variable with no `description` is always flagged.
      4. [WARNING] Variables with a constrained set of valid values (environments, AWS regions, instance families) must include a `validation` block. The `error_message` must be written in plain English naming the valid options.
      5. [WARNING] Variables accepting CIDR blocks must validate with `can(cidrnetmask(var.x))`. Variables accepting ARNs must validate with a regex matching `^arn:aws[a-z-]*:[a-z0-9-]+:`.
      6. [WARNING] Default values must be safe — never default to `"0.0.0.0/0"`, `publicly_accessible = true`, `encrypted = false`, `multi_az = false`, or any other insecure or production-unsafe value.
      7. [WARNING] Every output must have a `description` field. An output with no `description` is always flagged.
      8. [WARNING] Unused variables (declared but never referenced anywhere in the module) must be removed.
      9. [WARNING] Every `ignore_changes` block must have an inline comment naming the external system or process that manages the ignored attributes out-of-band (e.g., `# Managed by Kubernetes autoscaler — do not track desired_count in Terraform`).
      10. [WARNING] Commented-out code blocks must not be merged — use Git history for recovery.
      11. [WARNING] `TODO` and `FIXME` comments must include a GitLab issue reference (e.g., `# TODO(GL-123): migrate to aws_opensearch_domain`). Bare TODOs with no tracking reference are not acceptable.
      12. [SUGGESTION] Complex `for` expressions and `dynamic` blocks longer than 3 lines should have an inline comment explaining the transformation logic in plain English.
      13. [SUGGESTION] Multi-line ternary expressions should be extracted into a named `local` value — inline ternary chains reduce readability significantly.
      14. [SUGGESTION] Every module directory should contain a `README.md` with: purpose, usage example, inputs table, outputs table, and minimum Terraform and provider version requirements.

  # ============================================================
  # 7. TFE/TFC STATE & WORKSPACE MANAGEMENT
  # ============================================================
  - name: TFE/TFC State and Workspace Management
    fileFilters:
      - "**/backend.tf"
      - "**/versions.tf"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge
      - [WARNING]  — should be fixed
      - [SUGGESTION] — improvement

      Ensure Terraform Cloud/Enterprise is used correctly as the authoritative state and run backend:

      1. [CRITICAL] The backend must be `cloud` — do not use `remote` (deprecated), `s3`, or `local` backends in any shared or production workspace.
      2. [CRITICAL] Cross-stack data sharing must use the `tfe_outputs` data source (from the `hashicorp/tfe` provider) — never use `terraform_remote_state`, which requires manual state access token management and creates tight coupling between workspaces.
      3. [CRITICAL] AWS credentials in TFE/TFC must use Dynamic Provider Credentials (OIDC trust) — static IAM access keys stored as workspace variables are a critical security finding.
      4. [CRITICAL] `.tfstate` and `.tfstate.backup` files must never be committed to the repository — verify `.gitignore` explicitly excludes them.
      5. [WARNING] The `cloud` backend block must declare `organization` and a `workspaces` block using either `name` (single workspace) or `tags` (dynamic selection). The `prefix` argument is deprecated and must not be used.
      6. [WARNING] `tfe_outputs` data source references must drive the source workspace name from a variable — do not hardcode workspace names in the data source block, as this prevents the same root module from being reused across environments.
      7. [WARNING] Run triggers between dependent workspaces must be declared via `tfe_workspace_run_trigger` resources — do not rely on undocumented manual sequencing.
      8. [WARNING] The `hashicorp/tfe` provider must be explicitly pinned in `required_providers` alongside `hashicorp/aws`.
      9. [SUGGESTION] TFE/TFC workspace names referenced via `tfe_workspace` data sources should conform to a documented naming convention (e.g., `<org>-<project>-<component>-<environment>`). Workspaces that deviate from the documented pattern should be flagged for renaming.

  # ============================================================
  # 8. TAGGING, GDPR COMPLIANCE & COST HYGIENE
  # ============================================================
  - name: Tagging, GDPR Compliance and Cost Hygiene
    fileFilters:
      - "**/*.tf"
      - "!**/.terraform/**"
    instructions: |
      Review rules use three severity levels:
      - [CRITICAL] — must be fixed before merge
      - [WARNING]  — should be fixed
      - [SUGGESTION] — improvement

      Enforce compliant tagging, GDPR-required classifications, and cost-control configurations:

      TAGGING

      1. [CRITICAL] Every taggable AWS resource must include: `Name`, `Environment`, `Project`, `Owner` (team or squad email), `ManagedBy = "terraform"`. Missing any of these on a taggable resource is always flagged.
      2. [CRITICAL] Tag values must not be hardcoded directly on resources — all tags must be composed via a `local.common_tags` merge. A resource with literal string tag values (not `local.*` or `var.*` references) is always flagged.
      3. [WARNING] The AWS provider block must define `default_tags { tags = local.common_tags }` — resource-level `tags` blocks must only add resource-specific overrides, not repeat the common set.
      4. [WARNING] Tag keys must use consistent `PascalCase` across the entire project (`CostCentre`, `DataClassification`, `ManagedBy`). Mixed casing conventions within the same codebase is always flagged.
      5. [WARNING] Cost-allocation tags (`CostCentre`, `BillingTeam`) must be present on all compute, database, storage, and network resources.

      GDPR & DATA CLASSIFICATION

      6. [CRITICAL] All storage resources (S3 buckets, RDS instances, DynamoDB tables, EFS file systems, SQS queues, SNS topics) must have a `DataClassification` tag. Valid values are: `Public`, `Internal`, `Confidential`, `Restricted`. A storage resource without this tag is always a critical violation.
      7. [CRITICAL] Storage resources tagged `DataClassification = Confidential` or `DataClassification = Restricted` must also carry a `DataResidency` tag. For EU-resident data the value must be `EU`. A resource with `Confidential` or `Restricted` classification but no `DataResidency` tag is always a critical violation.
      8. [WARNING] The AWS provider `region` variable must include a `validation` block restricting allowed values to the approved EU region list: `eu-west-1`, `eu-west-2`, `eu-west-3`, `eu-central-1`, `eu-central-2`, `eu-north-1`, `eu-south-1`, `eu-south-2`. A region variable without this validation is always flagged.
      9. [WARNING] CloudWatch Log Groups, S3 access log buckets, ALB log buckets, and VPC flow log destinations must have `DataClassification = Confidential` — IP addresses are personal data under GDPR.

      COST HYGIENE

      10. [WARNING] `aws_cloudwatch_log_group` must define `retention_in_days` — indefinite retention (`retention_in_days` absent or set to 0) is both a cost and GDPR compliance violation.
      11. [WARNING] S3 buckets storing logs, artefacts, or backups must have `aws_s3_bucket_lifecycle_configuration` defined — buckets with no lifecycle policy accumulate storage cost indefinitely.
      12. [WARNING] `prevent_destroy = true` must be set in the `lifecycle` block of all production persistent data resources (RDS, S3, DynamoDB, EFS). Any MR that removes `prevent_destroy` from a production data resource must be flagged as a critical risk.
      13. [SUGGESTION] Production resources should include a `Criticality` tag (`Low`, `Medium`, `High`, `Critical`) to support incident prioritisation and on-call routing.
      14. [SUGGESTION] Temporary or test resources should include an `ExpiresOn` tag in `YYYY-MM-DD` format to support automated cleanup processes.
